name: kigali_directory
description: Kigali City Services & Places Directory

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # State Management
  provider: ^6.1.2
  # Maps
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.0
  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  # UI
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true